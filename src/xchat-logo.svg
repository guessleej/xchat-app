<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="xChat">
  <defs>
    <linearGradient id="b-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF3B47"/>
      <stop offset="1" stop-color="#C20A1E"/>
    </linearGradient>
    <linearGradient id="b-sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 紅色圓角方塊 + 頂部柔光 -->
  <rect x="2" y="2" width="116" height="116" rx="30" fill="url(#b-bg)"/>
  <rect x="2" y="2" width="116" height="116" rx="30" fill="url(#b-sheen)"/>

  <!-- 主角：粗體白色 X（乾淨圓角、無模糊）-->
  <g transform="translate(58,54)">
    <rect x="-27" y="-6.5" width="54" height="13" rx="6.5" fill="#ffffff" transform="rotate(45)"/>
    <rect x="-27" y="-6.5" width="54" height="13" rx="6.5" fill="#ffffff" transform="rotate(-45)"/>
  </g>

  <!-- 右下小聊天氣泡 badge（點出「chat」，白底紅點）-->
  <g transform="translate(92,92)">
    <rect x="-15" y="-12" width="30" height="22" rx="8" fill="#ffffff"/>
    <path d="M-7 10 L1 10 L-9 19 Z" fill="#ffffff"/>
    <circle cx="-7" cy="-1" r="2.6" fill="#D11122"/>
    <circle cx="0" cy="-1" r="2.6" fill="#D11122"/>
    <circle cx="7" cy="-1" r="2.6" fill="#D11122"/>
  </g>
</svg>
